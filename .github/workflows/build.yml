name: Build OpenWrt APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: POSIX shell tests
        run: sh scripts/verify.sh
      - name: Build with official OpenWrt 25.12.5 SDK
        run: sh scripts/build-with-sdk.sh
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: |
            dist/*.apk
            dist/SHA256SUMS
          if-no-files-found: error
