name: Update provider database

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: provider-database-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Refresh trusted provider sources
        run: sh scripts/refresh-providers.sh
      - name: Verify generated database and package behavior
        run: sh scripts/verify.sh
      - name: Commit safe update
        id: commit
        run: |
          if git diff --quiet -- data/provider-sources.json data/providers-report.json apn-autoconfig-providers/VERSION apn-autoconfig-providers/files/usr/share/apn-autoconfig/providers.tsv; then
            echo "Provider database is already current."
            echo "changed=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/provider-sources.json data/providers-report.json apn-autoconfig-providers/VERSION apn-autoconfig-providers/files/usr/share/apn-autoconfig/providers.tsv
          git commit -m "Update provider database"
          git push
          echo "changed=true" >>"$GITHUB_OUTPUT"
      - name: Publish signed provider package update
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build.yml --ref main -f publish_repository=true
