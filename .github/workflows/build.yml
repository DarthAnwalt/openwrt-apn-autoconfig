name: Build OpenWrt APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to receive verified assets (optional)
        required: false
        type: string
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: POSIX shell tests
        run: sh scripts/verify.sh
      - name: Build with official OpenWrt 25.12.5 SDK
        run: sh scripts/build-with-sdk.sh
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: |
            dist/*.apk
            dist/SHA256SUMS
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    needs: test-and-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified build artifact
        uses: actions/download-artifact@v8
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: release-assets
      - name: Attach APK and checksum to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            release-assets/*.apk \
            release-assets/SHA256SUMS \
            --clobber
