name: Build OpenWrt APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to receive verified assets (optional)
        required: false
        type: string
      publish_repository:
        description: Publish the signed APK repository to GitHub Pages
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: POSIX shell tests
        env:
          EXPECTED_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
        run: sh scripts/verify.sh
      - name: Build with official OpenWrt 25.12.5 SDK
        run: sh scripts/build-with-sdk.sh
      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: |
            dist/*.apk
            dist/SHA256SUMS
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    needs: test-and-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: release-assets
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*) ;;
            *) echo "Release tag must start with v followed by a digit." >&2; exit 1 ;;
          esac
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
      - name: Attach APK and checksum to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            release-assets/*.apk \
            release-assets/SHA256SUMS \
            --clobber

  publish-repository:
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_repository == true
    needs: test-and-build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - name: Install repository prerequisites
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Download verified packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: apn-autoconfig-openwrt-25.12.5
          path: release-assets
      - name: Restore the protected signing key
        env:
          APK_SIGNING_KEY_BASE64: ${{ secrets.APK_SIGNING_KEY_BASE64 }}
        run: |
          test -n "$APK_SIGNING_KEY_BASE64"
          umask 077
          printf '%s' "$APK_SIGNING_KEY_BASE64" |
            base64 --decode >"$RUNNER_TEMP/apn-autoconfig-private-key.pem"
          echo "APK_SIGNING_KEY_FILE=$RUNNER_TEMP/apn-autoconfig-private-key.pem" >>"$GITHUB_ENV"
      - name: Prepare the official OpenWrt APK tool
        run: |
          apk_tool="$(sh scripts/prepare-apk-tool.sh)"
          echo "APK_TOOL=$apk_tool" >>"$GITHUB_ENV"
      - name: Build and verify signed repository
        env:
          PACKAGE_DIR: ${{ github.workspace }}/release-assets
        run: sh scripts/build-repository.sh
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist/repository
          include-hidden-files: true
      - name: Deploy signed repository
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
      - name: Remove temporary signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/apn-autoconfig-private-key.pem"
